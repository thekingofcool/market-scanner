<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET SCANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #222222;
  --text: #e0e0e0;
  --text-dim: #888; 
  --text-mid: #aaa;
  --accent: #fff;
  --font: 'Press Start 2P', monospace;
  --c-good: #2ecc71;
  --c-bad: #e74c3c;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.6;
}

.container { max-width: 1920px; margin: 0 auto; padding: 40px 24px; }

/* ─── HEADER ─── */
.header-line {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 2px solid var(--border);
  padding-bottom: 24px;
  margin-bottom: 40px;
}
.main-title { font-size: 20px; letter-spacing: 0.1em; color: var(--accent); }
.update-ts { font-size: 9px; color: var(--text-dim); }

/* ─── SECTION LABELS ─── */
.section-label {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 20px;
  text-transform: uppercase;
}

/* ─── MACRO GRID: RESPONSIVE ─── */
#macro-wrapper { margin-bottom: 60px; }
.macro-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

@media (max-width: 600px) {
  .macro-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .main-title { font-size: 16px; }
  .header-line { flex-direction: column; gap: 10px; }
}

.macro-card { background: var(--bg); padding: 18px 15px; display: flex; flex-direction: column; gap: 8px; }
.macro-label { font-size: 7px; color: var(--text-dim); min-height: 14px; }
.macro-value { font-size: 15px; color: var(--accent); }
.macro-change { font-size: 8px; }
.macro-change.pos { color: var(--c-good); }
.macro-change.neg { color: var(--c-bad); }

/* ─── EQUITIES SECTION ─── */
.watchlist-bar { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
.watchlist-bar input {
  background: var(--surface); border: 1px solid var(--border); color: var(--accent);
  font-family: var(--font); font-size: 10px; padding: 12px 16px; width: 320px; outline: none;
}
.watchlist-bar input:focus { border-color: var(--text-mid); }
.watchlist-hint { font-size: 8px; color: var(--text-dim); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 9px; }

thead th {
  padding: 16px 10px; text-align: right; color: var(--text-dim); font-size: 8px;
  border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10;
}
thead th:first-child, thead th:nth-child(2) { text-align: left; }

tbody tr { border-bottom: 1px solid #1a1a1a; }
tbody tr:hover { background: var(--surface); }
tbody tr.pinned { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--accent); }
td { padding: 14px 10px; text-align: right; white-space: nowrap; }
td:first-child, td:nth-child(2) { text-align: left; }

.td-ticker { color: var(--accent); font-size: 11px; font-weight: bold; }
.td-name { color: var(--text-mid); font-size: 9px; }

/* ─── HEATMAPS ─── */
.hm { display: inline-block; padding: 5px 8px; font-size: 9px; min-width: 60px; text-align: right; border-radius: 2px; }
.hm-0 { background: rgba(139,0,0,0.3); color: #ff6b6b; }
.hm-1 { background: rgba(192,57,43,0.3); color: #e74c3c; }
.hm-5 { background: rgba(46,204,113,0.2); color: #2ecc71; }
.hm-6 { background: rgba(0,255,136,0.2); color: #00ff88; }

.sector-row td { padding: 45px 10px 15px; color: var(--accent); font-size: 11px; letter-spacing: 0.2em; border-bottom: 1px solid var(--border); }
#loading { padding: 100px; text-align: center; color: var(--text-dim); }

/* ─── TOOLTIP ─── */
/* 有 tooltip 的文字加虚线下划线提示 */
.has-tip {
  border-bottom: 1px dashed var(--text-dim);
  cursor: help;
  display: inline-block;
}

#tooltip {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease;
  max-width: 280px;
}
#tooltip.visible { opacity: 1; }

.tooltip-inner {
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 12px 14px;
  font-family: var(--font);
  font-size: 8px;
  line-height: 1.8;
  color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.8);
}
.tooltip-title {
  color: var(--accent);
  font-size: 9px;
  margin-bottom: 8px;
  letter-spacing: 0.1em;
}
.tooltip-desc {
  color: var(--text-mid);
  margin-bottom: 6px;
}
.tooltip-formula {
  color: #aaffaa;
  border-top: 1px solid #333;
  padding-top: 6px;
  margin-top: 6px;
  font-size: 7px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<!-- 全局 Tooltip 容器 -->
<div id="tooltip">
  <div class="tooltip-inner">
    <div class="tooltip-title" id="tip-title"></div>
    <div class="tooltip-desc" id="tip-desc"></div>
    <div class="tooltip-formula" id="tip-formula"></div>
  </div>
</div>

<div class="container">
  <div class="header-line">
    <div class="main-title">MARKET SCANNER</div>
    <div class="update-ts" id="last-updated">SYNCING...</div>
  </div>

  <div id="loading">INITIALIZING...</div>

  <div id="main-content" style="display:none">
    <section id="macro-wrapper">
      <div class="section-label">MACRO INDICATORS</div>
      <div class="macro-grid" id="macro-grid"></div>
    </section>

    <section id="table-section">
      <div class="section-label">US EQUITIES</div>
      <div class="watchlist-bar">
        <input type="text" id="pin-input" placeholder="TICKER TO PIN (E.G. NVDA)">
        <span class="watchlist-hint">HIT ENTER TO PIN TO TOP</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
// ─── TOOLTIP 数据字典 ───────────────────────────────────────────────────────

// ─── TOOLTIP 逻辑 ──────────────────────────────────────────────────────────
const tooltip  = document.getElementById('tooltip');
const tipTitle = document.getElementById('tip-title');
const tipDesc  = document.getElementById('tip-desc');
const tipFormula = document.getElementById('tip-formula');
let hideTimer = null;

function showTip(e, key) {
  const data = TIPS[key];
  if (!data) return;
  clearTimeout(hideTimer);
  tipTitle.textContent = data.title;
  tipDesc.textContent  = data.desc;
  if (data.formula) {
    tipFormula.textContent = '公式：' + data.formula;
    tipFormula.style.display = 'block';
  } else {
    tipFormula.style.display = 'none';
  }
  tooltip.classList.add('visible');
  positionTip(e);
}

function positionTip(e) {
  const pad = 14;
  const tw = tooltip.offsetWidth || 280;
  const th = tooltip.offsetHeight || 120;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + tw > window.innerWidth  - pad) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTip() {
  hideTimer = setTimeout(() => tooltip.classList.remove('visible'), 120);
}

document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTip(e);
});

// 给带 data-tip 属性的元素统一绑定事件
document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tip]');
  if (el) showTip(e, el.dataset.tip);
});
document.addEventListener('mouseout', e => {
  const el = e.target.closest('[data-tip]');
  if (el) hideTip();
});
// 移动端 tap
document.addEventListener('click', e => {
  const el = e.target.closest('[data-tip]');
  if (el) {
    if (tooltip.classList.contains('visible')) {
      tooltip.classList.remove('visible');
    } else {
      showTip(e, el.dataset.tip);
    }
  } else {
    tooltip.classList.remove('visible');
  }
});

// ─── MACRO & COLS 配置 ─────────────────────────────────────────────────────
const MACRO_ORDER = [
  'fed_funds_rate', '10y_treasury', '2y_treasury', '3m_treasury',
  'cpi_yoy', 'core_cpi', 'unemployment', 'gdp_growth',
  'vix', 'dxy', 'm2_money_supply'
];

const MACRO_META = {
  fed_funds_rate: { label: 'FED FUNDS RATE', suffix: '%' },
  '10y_treasury': { label: 'US 10Y YIELD',   suffix: '%' },
  '2y_treasury':  { label: 'US 2Y YIELD',    suffix: '%' },
  '3m_treasury':  { label: 'US 3M YIELD',    suffix: '%' },
  cpi_yoy:        { label: 'CPI YOY',        suffix: '%' },
  core_cpi:       { label: 'CORE CPI',       suffix: '%' },
  unemployment:   { label: 'UNEMPLOYMENT',   suffix: '%' },
  gdp_growth:     { label: 'GDP GROWTH',     suffix: '%' },
  vix:            { label: 'VIX INDEX',      suffix: '' },
  dxy:            { label: 'DOLLAR INDEX',   suffix: '' },
  m2_money_supply:{ label: 'M2 SUPPLY',      suffix: 'B' }
};

const COLS = [
  { key: 'ticker',           label: 'TICKER',      type: 'ticker' },
  { key: 'name',             label: 'NAME',        type: 'name' },
  { key: 'market_cap_b',     label: 'MCAP $B',     type: 'num' },
  { key: 'price',            label: 'PRICE',       type: 'num' },
  { key: 'change_pct',       label: 'CHG%',        type: 'change' },
  { key: 'pe',               label: 'P/E',         type: 'hm', hm: 'pe' },
  { key: 'ev_ebit',          label: 'EV/EBIT',     type: 'hm', hm: 'ev' },
  { key: 'ev_ebitda',        label: 'EV/EBITDA',   type: 'hm', hm: 'ev' },
  { key: 'fcf_yield',        label: 'FCF YLD',     type: 'hm', hm: 'yield' },
  { key: 'ps_ratio',         label: 'P/S',         type: 'hm', hm: 'pe' },
  { key: 'gross_margin',     label: 'GROSS%',      type: 'hm', hm: 'margin' },
  { key: 'operating_margin', label: 'OP MGN%',     type: 'hm', hm: 'margin' },
  { key: 'net_margin',       label: 'NET MGN%',    type: 'hm', hm: 'margin' },
  { key: 'fcf_margin',       label: 'FCF MGN%',    type: 'hm', hm: 'margin' },
  { key: 'roic',             label: 'ROIC%',       type: 'hm', hm: 'margin' },
  { key: 'roe',              label: 'ROE%',        type: 'hm', hm: 'margin' },
  { key: 'revenue_cagr',     label: 'REV CAGR',    type: 'hm', hm: 'cagr' },
  { key: 'eps_cagr',         label: 'EPS CAGR',    type: 'hm', hm: 'cagr' },
  { key: 'debt_ebitda',      label: 'DEBT/EBITDA', type: 'hm', hm: 'debt' },
  { key: 'interest_coverage',label: 'INT COV',     type: 'hm', hm: 'int' },
  { key: 'revenue_ttm',      label: 'REV $M',      type: 'num' },
  { key: 'fcf_ttm',          label: 'FCF $M',      type: 'num' },
  { key: 'eps',              label: 'EPS',         type: 'num' }
];

const HM_RULES = {
  pe:     v => v < 15 ? 6 : v < 25 ? 4 : 2,
  ev:     v => v < 12 ? 6 : v < 18 ? 4 : 2,
  yield:  v => v > 7  ? 6 : v > 4  ? 4 : 2,
  margin: v => v > 35 ? 6 : v > 15 ? 4 : 2,
  cagr:   v => v > 15 ? 6 : v > 8  ? 4 : 2,
  debt:   v => v < 1.5? 6 : v < 3.5? 4 : 2,
  int:    v => v > 8  ? 6 : v > 3  ? 4 : 2
};

let rawData = null;
let pinnedTickers = new Set();

function formatUpdateDate(dateStr) {
  const d = new Date(dateStr);
  return `UPDATED: ${d.toISOString().substring(0, 19)}Z`;
}

function renderCell(col, s) {
  const v = s[col.key];
  if (v == null) return '<span style="color:#333">—</span>';
  if (col.type === 'ticker') return `<span class="td-ticker">${v}</span>`;
  if (col.type === 'name')   return `<span class="td-name">${v.slice(0,18)}</span>`;
  if (col.type === 'change') return `<span class="hm hm-${v > 0 ? 5 : 1}">${v > 0 ? '+' : ''}${v}%</span>`;
  if (col.type === 'hm') {
    const score = HM_RULES[col.hm] ? HM_RULES[col.hm](v) : 3;
    return `<span class="hm hm-${score}">${v.toFixed(1)}</span>`;
  }
  return v.toLocaleString();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const sectors = rawData.sectors || {};
  let rows = '';

  let pinnedData = [];
  Object.values(sectors).flat().forEach(s => {
    if (pinnedTickers.has(s.ticker.toUpperCase())) pinnedData.push(s);
  });
  if (pinnedData.length > 0) {
    rows += `<tr class="sector-row"><td colspan="${COLS.length}">WATCHLIST</td></tr>`;
    pinnedData.forEach(s => rows += `<tr class="pinned">${COLS.map(c => `<td>${renderCell(c, s)}</td>`).join('')}</tr>`);
  }

  const SECTOR_ORDER = ["Technology","Healthcare","Financials","Consumer Discretionary","Communication Services","Industrials","Consumer Staples","Energy","Utilities","Real Estate","Materials","Other"];
  SECTOR_ORDER.forEach(sec => {
    if (sectors[sec]) {
      rows += `<tr class="sector-row"><td colspan="${COLS.length}">${sec.toUpperCase()}</td></tr>`;
      sectors[sec].sort((a,b) => (b.market_cap_b||0)-(a.market_cap_b||0)).forEach(s => {
        rows += `<tr>${COLS.map(c => `<td>${renderCell(c, s)}</td>`).join('')}</tr>`;
      });
    }
  });
  tbody.innerHTML = rows;
}

async function init() {
  try {
    const res = await fetch('./data/market.json');
    rawData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    if (rawData.meta?.generated_at)
      document.getElementById('last-updated').textContent = formatUpdateDate(rawData.meta.generated_at);

    // ── 宏观指标渲染（label 加 data-tip）
    const mGrid = document.getElementById('macro-grid');
    MACRO_ORDER.forEach(key => {
      const v    = rawData.macro[key];
      const meta = MACRO_META[key];
      if (!v) return;
      const hasTip = TIPS[key] ? 'class="has-tip" data-tip="' + key + '"' : '';
      mGrid.innerHTML += `
        <div class="macro-card">
          <div class="macro-label"><span ${hasTip}>${meta.label}</span></div>
          <div class="macro-value">${v.value}${meta.suffix}</div>
          <div class="macro-change ${v.change > 0 ? 'neg' : 'pos'}">${v.change > 0 ? '+' : ''}${v.change}${meta.suffix}</div>
        </div>`;
    });

    // ── 表头渲染（th 内容加 data-tip）
    document.getElementById('table-head').innerHTML =
      `<tr>${COLS.map(c => {
        const hasTip = TIPS[c.key] ? ` class="has-tip" data-tip="${c.key}"` : '';
        return `<th><span${hasTip}>${c.label}</span></th>`;
      }).join('')}</tr>`;

    renderTable();

    document.getElementById('pin-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim().toUpperCase();
        if (val) { pinnedTickers.add(val); e.target.value = ''; renderTable(); }
      }
    });
  } catch (e) {
    document.getElementById('loading').textContent = 'FETCH ERROR';
  }
}
init();
</script>
</body>
</html>
