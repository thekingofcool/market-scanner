<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET SCANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #222222;
  --text: #e0e0e0;
  --text-dim: #555;
  --text-mid: #888;
  --accent: #fff;
  --font: 'Press Start 2P', monospace;
  --c-good: #2ecc71;
  --c-bad: #c0392b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  line-height: 1.6;
}

.container { max-width: 1600px; margin: 0 auto; padding: 60px 24px; }

/* ─── TITLE ─── */
.main-title {
  font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 48px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 20px;
}

/* ─── TWO-COLUMN LAYOUT ─── */
.top-layout {
  display: flex;
  gap: 40px;
  margin-bottom: 32px;
}

.section-group {
  display: flex;
  flex-direction: column;
}

.equities-label-side {
  flex: 0 0 280px;
}

.macro-side {
  flex: 1;
}

.section-label {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.update-ts {
  font-size: 7px;
  color: #444;
  margin-top: 8px;
  text-transform: uppercase;
}

/* ─── MACRO GRID ─── */
.macro-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.macro-card { background: var(--bg); padding: 16px 14px; display: flex; flex-direction: column; gap: 8px; }
.macro-label { font-size: 6px; color: var(--text-dim); }
.macro-value { font-size: 13px; color: var(--accent); }
.macro-change { font-size: 7px; }
.macro-change.pos { color: var(--c-good); }
.macro-change.neg { color: var(--c-bad); }

/* ─── TABLE ─── */
#table-section { padding: 20px 0 60px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 8px; }

thead th {
  padding: 12px 10px; text-align: right; color: var(--text-dim); font-size: 6px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10;
}
thead th:first-child, thead th:nth-child(2) { text-align: left; }

tbody tr { border-bottom: 1px solid #161616; }
tbody tr:hover { background: var(--surface); }
td { padding: 10px; text-align: right; white-space: nowrap; }
td:first-child, td:nth-child(2) { text-align: left; }

.td-ticker { color: var(--accent); font-size: 9px; }
.td-name { color: var(--text-mid); font-size: 7px; }

/* ─── HEATMAP ─── */
.hm { display: inline-block; padding: 4px 6px; font-size: 7px; min-width: 52px; text-align: right; border-radius: 2px; }
.hm-0 { background: rgba(139,0,0,0.25); color: #ff6b6b; }
.hm-1 { background: rgba(192,57,43,0.2); color: #e74c3c; }
.hm-2 { background: rgba(230,126,34,0.15); color: #e67e22; }
.hm-3 { background: rgba(100,100,100,0.1); color: var(--text-mid); }
.hm-4 { background: rgba(39,174,96,0.12); color: #27ae60; }
.hm-5 { background: rgba(46,204,113,0.15); color: #2ecc71; }
.hm-6 { background: rgba(0,255,136,0.12); color: #00ff88; }

.sector-row td { padding: 30px 10px 10px; color: var(--text-dim); font-size: 7px; letter-spacing: 0.15em; border-bottom: 1px solid var(--border); }
#loading { padding: 100px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">
  <h1 class="main-title">MARKET SCANNER</h1>

  <div class="top-layout">
    <div class="section-group equities-label-side">
      <div class="section-label">US EQUITIES</div>
      <div class="update-ts" id="last-updated">SYNCING...</div>
    </div>
    
    <div class="section-group macro-side">
      <div class="section-label">MACRO INDICATORS</div>
      <div class="macro-grid" id="macro-grid"></div>
    </div>
  </div>

  <div id="loading">INITIALIZING...</div>

  <section id="table-section" style="display:none">
    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
const MACRO_META = {
  fed_funds_rate: { suffix: '%' },
  cpi_yoy: { suffix: '%' },
  unemployment: { suffix: '%' },
  gdp_growth: { suffix: '%' },
  vix: { suffix: '' },
  m2_money_supply: { suffix: 'B' },
  '10y_treasury': { suffix: '%' }
};

const COLS = [
  { key: 'ticker', label: 'TICKER', type: 'ticker' },
  { key: 'name', label: 'NAME', type: 'name' },
  { key: 'market_cap_b', label: 'MCAP $B', type: 'num' },
  { key: 'price', label: 'PRICE', type: 'num' },
  { key: 'change_pct', label: 'CHG%', type: 'change' },
  { key: 'pe', label: 'P/E', type: 'hm', hm: 'pe' },
  { key: 'ev_ebit', label: 'EV/EBIT', type: 'hm', hm: 'ev' },
  { key: 'fcf_yield', label: 'FCF YLD', type: 'hm', hm: 'yield' },
  { key: 'roic', label: 'ROIC%', type: 'hm', hm: 'yield' },
  { key: 'revenue_cagr', label: 'REV CAGR', type: 'hm', hm: 'yield' },
  { key: 'debt_ebitda', label: 'DEBT/EBITDA', type: 'hm', hm: 'debt' },
  { key: 'revenue_ttm', label: 'REV $M', type: 'num' }
];

const HM_RULES = {
  pe: v => v < 15 ? 6 : v < 25 ? 4 : 2,
  ev: v => v < 12 ? 6 : v < 18 ? 4 : 2,
  yield: v => v > 8 ? 6 : v > 4 ? 4 : 2,
  debt: v => v < 1 ? 6 : v < 3 ? 4 : 2
};

function formatUpdateDate(dateStr) {
  const d = new Date(dateStr);
  const fmt = new Intl.DateTimeFormat('en-US', { 
    month: 'short', day: 'numeric', year: 'numeric', 
    hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'UTC' 
  }).format(d);
  return `UPDATED: ${fmt.replace(',', '')} UTC`;
}

function renderCell(col, s) {
  const v = s[col.key];
  if (v == null) return '<span style="color:#333">—</span>';
  if (col.type === 'ticker') return `<span class="td-ticker">${v}</span>`;
  if (col.type === 'name') return `<span class="td-name">${v.slice(0,18)}</span>`;
  if (col.type === 'change') return `<span class="hm hm-${v > 0 ? 5 : 1}">${v > 0 ? '+' : ''}${v}%</span>`;
  if (col.type === 'hm') return `<span class="hm hm-${HM_RULES[col.hm](v)}">${v.toFixed(1)}</span>`;
  return v.toLocaleString();
}

async function init() {
  try {
    const res = await fetch('./data/market.json');
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-section').style.display = 'block';

    if (data.meta?.generated_at) {
      document.getElementById('last-updated').textContent = formatUpdateDate(data.meta.generated_at);
    }

    const mGrid = document.getElementById('macro-grid');
    Object.entries(data.macro || {}).forEach(([k, v]) => {
      const meta = MACRO_META[k] || { suffix: '' };
      mGrid.innerHTML += `
        <div class="macro-card">
          <div class="macro-label">${k.replace(/_/g,' ').toUpperCase()}</div>
          <div class="macro-value">${v.value}${meta.suffix}</div>
          <div class="macro-change ${v.change > 0 ? 'neg' : 'pos'}">${v.change > 0 ? '+' : ''}${v.change}${meta.suffix}</div>
        </div>`;
    });

    const thead = document.getElementById('table-head');
    thead.innerHTML = `<tr>${COLS.map(c => `<th>${c.label}</th>`).join('')}</tr>`;

    const sectors = data.sectors || {};
    const tbody = document.getElementById('table-body');
    let rows = '';
    Object.keys(sectors).forEach(sec => {
      rows += `<tr class="sector-row"><td colspan="${COLS.length}">${sec.toUpperCase()}</td></tr>`;
      sectors[sec].sort((a,b) => (b.market_cap_b||0) - (a.market_cap_b||0)).forEach(s => {
        rows += `<tr>${COLS.map(c => `<td>${renderCell(c, s)}</td>`).join('')}</tr>`;
      });
    });
    tbody.innerHTML = rows;

  } catch (e) {
    document.getElementById('loading').textContent = 'CONNECTION ERROR';
  }
}
init();
</script>
</body>
</html>
