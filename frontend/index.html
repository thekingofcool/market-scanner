<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET SCANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #222222;
  --text: #e0e0e0;
  --text-dim: #555;
  --text-mid: #888;
  --accent: #fff;
  --font: 'Press Start 2P', monospace;

  --c-vbad:    #8b0000;
  --c-bad:     #c0392b;
  --c-poor:    #e67e22;
  --c-neutral: #888888;
  --c-ok:      #27ae60;
  --c-good:    #2ecc71;
  --c-great:   #00ff88;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCANLINE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ─── LAYOUT ─── */
.container {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── HEADER ─── */
header {
  border-bottom: 1px solid var(--border);
  padding: 24px 0 20px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.header-inner {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--accent);
}

.logo span {
  color: var(--text-dim);
  font-size: 8px;
}

.header-meta {
  display: flex;
  gap: 24px;
  align-items: center;
}

.last-updated {
  color: var(--text-dim);
  font-size: 7px;
}

.market-status {
  font-size: 7px;
  color: var(--c-good);
  display: flex;
  align-items: center;
  gap: 6px;
}

.market-status::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-good);
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ─── LOADING ─── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
}

.loading-bar {
  width: 300px;
  height: 4px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}

.loading-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%;
  height: 100%;
  background: var(--accent);
  animation: loading 1.2s ease-in-out infinite;
}

@keyframes loading {
  to { left: 150%; }
}

.loading-text {
  font-size: 8px;
  color: var(--text-dim);
  animation: blink 1s infinite;
}

/* ─── MACRO SECTION ─── */
#macro-section {
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.macro-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.macro-card {
  background: var(--bg);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: background 0.15s;
}

.macro-card:hover {
  background: var(--surface);
}

.macro-label {
  font-size: 6px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

.macro-value {
  font-size: 13px;
  color: var(--accent);
  line-height: 1;
}

.macro-change {
  font-size: 7px;
}

.macro-change.pos { color: var(--c-good); }
.macro-change.neg { color: var(--c-bad); }
.macro-change.neu { color: var(--text-dim); }

/* ─── SUMMARY BAR ─── */
#summary-bar {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.summary-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.summary-item .s-label {
  font-size: 6px;
  color: var(--text-dim);
}

.summary-item .s-value {
  font-size: 9px;
  color: var(--text);
}

/* ─── SECTOR TABS ─── */
#sector-nav {
  padding: 16px 0 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

#sector-nav::-webkit-scrollbar { display: none; }

.sector-tab {
  padding: 10px 14px 8px;
  font-family: var(--font);
  font-size: 7px;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.05em;
  transition: color 0.15s, border-color 0.15s;
}

.sector-tab:hover { color: var(--text); }

.sector-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ─── TABLE ─── */
#table-section {
  padding: 0 0 60px;
}

.table-wrap {
  overflow-x: auto;
  margin-top: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 8px;
}

thead th {
  padding: 10px 10px 8px;
  text-align: right;
  color: var(--text-dim);
  font-size: 6px;
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 73px;
  background: var(--bg);
  z-index: 10;
}

thead th:first-child,
thead th:nth-child(2) {
  text-align: left;
}

thead th:hover { color: var(--text); }

thead th.sorted-asc::after  { content: ' ▲'; color: var(--accent); }
thead th.sorted-desc::after { content: ' ▼'; color: var(--accent); }

tbody tr {
  border-bottom: 1px solid #161616;
  transition: background 0.1s;
}

tbody tr:hover { background: var(--surface); }

td {
  padding: 9px 10px;
  text-align: right;
  white-space: nowrap;
  vertical-align: middle;
}

td:first-child { text-align: left; }
td:nth-child(2) { text-align: left; }

.td-ticker {
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 0.05em;
}

.td-name {
  font-size: 7px;
  color: var(--text-mid);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.td-mcap {
  font-size: 8px;
  color: var(--text);
}

.td-price {
  font-size: 8px;
  color: var(--text);
}

.td-change {
  font-size: 7px;
}

.td-null {
  color: var(--text-dim);
  font-size: 7px;
}

/* ─── HEATMAP CELLS ─── */
.hm {
  display: inline-block;
  padding: 3px 6px;
  font-size: 7px;
  min-width: 52px;
  text-align: right;
  border-radius: 2px;
}

.hm-0 { background: rgba(139,0,0,0.25);    color: #ff6b6b; }
.hm-1 { background: rgba(192,57,43,0.2);   color: #e74c3c; }
.hm-2 { background: rgba(230,126,34,0.15); color: #e67e22; }
.hm-3 { background: rgba(100,100,100,0.1); color: var(--text-mid); }
.hm-4 { background: rgba(39,174,96,0.12);  color: #27ae60; }
.hm-5 { background: rgba(46,204,113,0.15); color: #2ecc71; }
.hm-6 { background: rgba(0,255,136,0.12);  color: #00ff88; }

/* ─── SECTOR HEADER ─── */
.sector-header-row td {
  padding: 20px 10px 6px;
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  border-bottom: 1px solid var(--border);
}

/* ─── LEGEND ─── */
#legend {
  padding: 16px 0;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.legend-label {
  font-size: 6px;
  color: var(--text-dim);
  margin-right: 4px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 6px;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

/* ─── TOOLTIP ─── */
.tooltip-wrap { position: relative; }
.tooltip-wrap:hover .tooltip-box { opacity: 1; pointer-events: none; }

.tooltip-box {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a;
  border: 1px solid var(--border);
  padding: 8px 10px;
  font-size: 7px;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  pointer-events: none;
}

@media (max-width: 768px) {
  .logo { font-size: 10px; }
  .macro-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        MARKET SCANNER
        <span>// US EQUITIES</span>
      </div>
      <div class="header-meta">
        <div class="last-updated" id="last-updated">LOADING...</div>
        <div class="market-status" id="market-status">DATA LIVE</div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div id="loading">
    <div class="loading-text">LOADING MARKET DATA...</div>
    <div class="loading-bar"></div>
  </div>

  <div id="content" style="display:none">
    <section id="macro-section">
      <div class="section-label">MACRO INDICATORS</div>
      <div class="macro-grid" id="macro-grid"></div>
    </section>

    <div id="summary-bar"></div>

    <div id="sector-nav"></div>

    <section id="table-section">
      <div class="table-wrap">
        <table id="main-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>

    <div id="legend">
      <span class="legend-label">HEALTH:</span>
      <div class="legend-item"><div class="legend-dot hm-0"></div><span>VERY POOR</span></div>
      <div class="legend-item"><div class="legend-dot hm-1"></div><span>POOR</span></div>
      <div class="legend-item"><div class="legend-dot hm-2"></div><span>BELOW AVG</span></div>
      <div class="legend-item"><div class="legend-dot hm-3"></div><span>NEUTRAL</span></div>
      <div class="legend-item"><div class="legend-dot hm-4"></div><span>GOOD</span></div>
      <div class="legend-item"><div class="legend-dot hm-5"></div><span>GREAT</span></div>
      <div class="legend-item"><div class="legend-dot hm-6"></div><span>EXCELLENT</span></div>
    </div>
  </div>
</div>

<script>
let allStocks = [];
let filteredStocks = [];
let currentSector = 'ALL';
let sortCol = 'market_cap';
let sortDir = 'desc';

const COLS = [
  { key: 'ticker',           label: 'TICKER',     type: 'ticker',   sortable: true,  tooltip: null },
  { key: 'name',             label: 'NAME',       type: 'name',     sortable: true,  tooltip: null },
  { key: 'market_cap_b',     label: 'MCAP $B',    type: 'mcap',     sortable: true,  tooltip: 'Market Capitalization in Billions USD' },
  { key: 'price',            label: 'PRICE',      type: 'price',    sortable: true,  tooltip: 'Current share price' },
  { key: 'change_pct',       label: 'CHG%',       type: 'change',   sortable: true,  tooltip: 'Price change %' },
  { key: 'pe',               label: 'P/E',        type: 'hm',       sortable: true,  hm: 'pe',         tooltip: 'Price / Earnings. Lower = cheaper' },
  { key: 'ev_ebit',          label: 'EV/EBIT',    type: 'hm',       sortable: true,  hm: 'ev_ebit',    tooltip: 'Enterprise Value / EBIT. Core value metric.' },
  { key: 'ev_ebitda',        label: 'EV/EBITDA',  type: 'hm',       sortable: true,  hm: 'ev_ebitda',  tooltip: 'Enterprise Value / EBITDA' },
  { key: 'fcf_yield',        label: 'FCF YLD',    type: 'hm',       sortable: true,  hm: 'fcf_yield',  tooltip: 'Free Cash Flow Yield. Higher = better.' },
  { key: 'ps_ratio',         label: 'P/S',        type: 'hm',       sortable: true,  hm: 'ps',         tooltip: 'Price / Sales' },
  { key: 'gross_margin',     label: 'GROSS%',     type: 'hm',       sortable: true,  hm: 'margin_pct', tooltip: 'Gross Profit Margin %' },
  { key: 'operating_margin', label: 'OP MGN%',    type: 'hm',       sortable: true,  hm: 'op_margin',  tooltip: 'Operating Margin %' },
  { key: 'net_margin',       label: 'NET MGN%',   type: 'hm',       sortable: true,  hm: 'op_margin',  tooltip: 'Net Profit Margin %' },
  { key: 'fcf_margin',       label: 'FCF MGN%',   type: 'hm',       sortable: true,  hm: 'op_margin',  tooltip: 'Free Cash Flow Margin %' },
  { key: 'roic',             label: 'ROIC%',      type: 'hm',       sortable: true,  hm: 'roic',       tooltip: 'Return on Invested Capital. >15% = great.' },
  { key: 'roe',              label: 'ROE%',       type: 'hm',       sortable: true,  hm: 'roe',        tooltip: 'Return on Equity' },
  { key: 'revenue_cagr',     label: 'REV CAGR',   type: 'hm',       sortable: true,  hm: 'cagr',       tooltip: 'Revenue CAGR (4-year)' },
  { key: 'eps_cagr',         label: 'EPS CAGR',   type: 'hm',       sortable: true,  hm: 'cagr',       tooltip: 'EPS CAGR (4-year)' },
  { key: 'debt_ebitda',      label: 'DEBT/EBITDA',type: 'hm',       sortable: true,  hm: 'debt_ebitda',tooltip: 'Total Debt / EBITDA. Lower = less leveraged.' },
  { key: 'interest_coverage',label: 'INT COV',    type: 'hm',       sortable: true,  hm: 'int_cov',    tooltip: 'Interest Coverage (EBIT/Interest). >3x = safe.' },
  { key: 'revenue_ttm',      label: 'REV $M',     type: 'number',   sortable: true,  tooltip: 'Trailing 12-month Revenue in $M' },
  { key: 'fcf_ttm',          label: 'FCF $M',     type: 'number',   sortable: true,  tooltip: 'Trailing 12-month Free Cash Flow in $M' },
  { key: 'eps',              label: 'EPS',        type: 'number',   sortable: true,  tooltip: 'Earnings Per Share' },
];

const HM = {
  pe: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v < 10)  return 6;
    if (v < 15)  return 5;
    if (v < 20)  return 4;
    if (v < 30)  return 3;
    if (v < 50)  return 2;
    if (v < 100) return 1;
    return 0;
  },
  ev_ebit: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v < 8)   return 6;
    if (v < 12)  return 5;
    if (v < 16)  return 4;
    if (v < 22)  return 3;
    if (v < 35)  return 2;
    if (v < 60)  return 1;
    return 0;
  },
  ev_ebitda: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)  return 0;
    if (v < 6)  return 6;
    if (v < 9)  return 5;
    if (v < 12) return 4;
    if (v < 18) return 3;
    if (v < 25) return 2;
    if (v < 40) return 1;
    return 0;
  },
  fcf_yield: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 10)  return 6;
    if (v > 7)   return 5;
    if (v > 5)   return 4;
    if (v > 3)   return 3;
    if (v > 1.5) return 2;
    if (v > 0)   return 1;
    return 0;
  },
  ps: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v < 1)   return 6;
    if (v < 2)   return 5;
    if (v < 4)   return 4;
    if (v < 8)   return 3;
    if (v < 15)  return 2;
    if (v < 30)  return 1;
    return 0;
  },
  margin_pct: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 70)  return 6;
    if (v > 50)  return 5;
    if (v > 35)  return 4;
    if (v > 20)  return 3;
    if (v > 10)  return 2;
    if (v > 0)   return 1;
    return 0;
  },
  op_margin: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 30)  return 6;
    if (v > 20)  return 5;
    if (v > 12)  return 4;
    if (v > 6)   return 3;
    if (v > 2)   return 2;
    if (v > 0)   return 1;
    return 0;
  },
  roic: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 30)  return 6;
    if (v > 20)  return 5;
    if (v > 15)  return 4;
    if (v > 10)  return 3;
    if (v > 5)   return 2;
    if (v > 0)   return 1;
    return 0;
  },
  roe: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 30)  return 6;
    if (v > 20)  return 5;
    if (v > 15)  return 4;
    if (v > 10)  return 3;
    if (v > 5)   return 2;
    if (v > 0)   return 1;
    return 0;
  },
  cagr: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 25)  return 6;
    if (v > 15)  return 5;
    if (v > 10)  return 4;
    if (v > 5)   return 3;
    if (v > 2)   return 2;
    if (v >= 0)  return 1;
    return 0;
  },
  debt_ebitda: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 3;
    if (v < 0.5) return 6;
    if (v < 1)   return 5;
    if (v < 2)   return 4;
    if (v < 3)   return 3;
    if (v < 5)   return 2;
    if (v < 8)   return 1;
    return 0;
  },
  int_cov: v => {
    if (v === null || v === undefined) return null;
    if (v < 0)   return 0;
    if (v > 15)  return 6;
    if (v > 8)   return 5;
    if (v > 5)   return 4;
    if (v > 3)   return 3;
    if (v > 2)   return 2;
    if (v > 1)   return 1;
    return 0;
  },
};

function hmScore(hmType, value) {
  const fn = HM[hmType];
  return fn ? fn(value) : null;
}

function fmt(v, decimals = 2) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="td-null">—</span>';
  return Number(v).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="td-null">—</span>';
  const sign = v > 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}

function fmtMcap(v) {
  if (!v) return '<span class="td-null">—</span>';
  if (v >= 1000) return `$${(v/1000).toFixed(1)}T`;
  if (v >= 1)    return `$${v.toFixed(1)}B`;
  return `$${(v*1000).toFixed(0)}M`;
}

function renderHmCell(hmType, value) {
  if (value === null || value === undefined) return '<span class="td-null">—</span>';
  const score = hmScore(hmType, value);
  if (score === null) return `<span class="td-null">${fmt(value)}</span>`;
  const display = (typeof value === 'number' && !Number.isInteger(value)) ? value.toFixed(1) : value;
  return `<span class="hm hm-${score}">${display}</span>`;
}

function renderCell(col, stock) {
  const v = stock[col.key];
  switch (col.type) {
    case 'ticker': return `<span class="td-ticker">${v || '—'}</span>`;
    case 'name': return `<span class="td-name" title="${v || ''}">${v ? (v.length > 22 ? v.slice(0,22)+'...' : v) : '—'}</span>`;
    case 'mcap': return `<span class="td-mcap">${fmtMcap(v)}</span>`;
    case 'price': return `<span class="td-price">${v ? fmt(v) : '<span class="td-null">—</span>'}</span>`;
    case 'change':
      if (v === null || v === undefined) return '<span class="td-null">—</span>';
      return `<span class="td-change ${v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu'} hm hm-${v > 2 ? 6 : v > 0 ? 4 : v > -2 ? 2 : 0}">${fmtPct(v)}</span>`;
    case 'hm': return renderHmCell(col.hm, v);
    case 'number': return v !== null && v !== undefined ? `<span>${fmt(v, v > 100 ? 0 : 2)}</span>` : '<span class="td-null">—</span>';
    default: return v ?? '<span class="td-null">—</span>';
  }
}

const MACRO_LABELS = {
  fed_funds_rate:  { label: 'FED FUNDS RATE',  suffix: '%',  lowerBetter: true },
  cpi_yoy:         { label: 'CPI YoY',          suffix: '%',  lowerBetter: true },
  pce_inflation:   { label: 'PCE INFLATION',    suffix: '',   lowerBetter: true },
  unemployment:    { label: 'UNEMPLOYMENT',     suffix: '%',  lowerBetter: true },
  gdp_growth:      { label: 'GDP GROWTH',       suffix: '%',  lowerBetter: false },
  '10y_treasury':  { label: '10Y TREASURY',     suffix: '%',  lowerBetter: null },
  '2y_treasury':   { label: '2Y TREASURY',      suffix: '%',  lowerBetter: null },
  yield_curve:     { label: 'YIELD CURVE (10-2)',suffix: '%',  lowerBetter: null },
  m2_money_supply: { label: 'M2 MONEY SUPPLY',  suffix: 'B',  lowerBetter: null },
  vix:             { label: 'VIX',              suffix: '',   lowerBetter: true },
};

function renderMacro(macro) {
  const grid = document.getElementById('macro-grid');
  grid.innerHTML = '';
  for (const [key, meta] of Object.entries(MACRO_LABELS)) {
    const data = macro[key];
    if (!data || data.value === null) continue;
    const chg = data.change;
    let changeClass = 'neu', changeStr = '';
    if (chg !== null && chg !== undefined) {
      const better = meta.lowerBetter === null ? null : (meta.lowerBetter ? chg < 0 : chg > 0);
      changeClass = better === true ? 'pos' : better === false ? 'neg' : 'neu';
      changeStr = (chg > 0 ? '+' : '') + chg.toFixed(2) + meta.suffix;
    }
    grid.innerHTML += `<div class="macro-card"><div class="macro-label">${meta.label}</div><div class="macro-value">${data.value}${meta.suffix}</div>${changeStr ? `<div class="macro-change ${changeClass}">${changeStr}</div>` : ''}</div>`;
  }
}

function renderTableHead() {
  const thead = document.getElementById('table-head');
  thead.innerHTML = `<tr>${COLS.map(col => {
    const cls = col.key === sortCol ? (sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc') : '';
    return `<th class="${cls}" data-key="${col.key}" title="${col.tooltip || col.label}">${col.label}</th>`;
  }).join('')}</tr>`;
  thead.querySelectorAll('th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortCol === key) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      else { sortCol = key; sortDir = 'desc'; }
      applyFiltersAndRender();
    });
  });
}

function renderTableBody(stocks) {
  const tbody = document.getElementById('table-body');
  if (!stocks.length) {
    tbody.innerHTML = `<tr><td colspan="${COLS.length}" style="text-align:center;padding:40px;color:var(--text-dim)">NO RESULTS</td></tr>`;
    return;
  }
  let rows = '', lastSector = null;
  for (const stock of stocks) {
    const sector = stock.sector || 'Other';
    if (currentSector === 'ALL' && sector !== lastSector) {
      rows += `<tr class="sector-header-row"><td colspan="${COLS.length}">${sector.toUpperCase()}</td></tr>`;
      lastSector = sector;
    }
    rows += `<tr>${COLS.map(col => `<td>${renderCell(col, stock)}</td>`).join('')}</tr>`;
  }
  tbody.innerHTML = rows;
}

const SECTOR_ORDER_LIST = ["ALL","Technology","Healthcare","Financials","Consumer Discretionary","Communication Services","Industrials","Consumer Staples","Energy","Utilities","Real Estate","Materials","Other"];

function buildSectorNav(stocks) {
  const nav = document.getElementById('sector-nav');
  const counts = {};
  stocks.forEach(s => { const sec = s.sector || 'Other'; counts[sec] = (counts[sec] || 0) + 1; });
  const sectors = ['ALL', ...SECTOR_ORDER_LIST.slice(1).filter(s => counts[s])];
  nav.innerHTML = sectors.map(s => {
    const count = s === 'ALL' ? stocks.length : counts[s] || 0;
    return `<button class="sector-tab ${s === currentSector ? 'active' : ''}" data-sector="${s}">${s === 'ALL' ? 'ALL SECTORS' : s.toUpperCase().slice(0,12)}&nbsp;<span style="color:var(--text-dim)">${count}</span></button>`;
  }).join('');
  nav.querySelectorAll('.sector-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSector = btn.dataset.sector;
      nav.querySelectorAll('.sector-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFiltersAndRender();
    });
  });
}

function applyFiltersAndRender() {
  let stocks = [...allStocks];
  if (currentSector !== 'ALL') stocks = stocks.filter(s => s.sector === currentSector);
  stocks.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av === null || av === undefined) av = sortDir === 'desc' ? -Infinity : Infinity;
    if (bv === null || bv === undefined) bv = sortDir === 'desc' ? -Infinity : Infinity;
    return sortDir === 'desc' ? bv - av : av - bv;
  });
  filteredStocks = stocks;
  renderTableHead();
  renderTableBody(filteredStocks);
}

function renderSummary(summary) {
  const bar = document.getElementById('summary-bar');
  const items = [
    { label: 'TOTAL STOCKS', value: summary.total_stocks?.toLocaleString() },
    { label: 'TOTAL MKTCAP', value: `${summary.total_market_cap_t}T` },
    { label: 'SECTORS',      value: summary.sectors },
    { label: 'AS OF',        value: summary.last_updated ? new Date(summary.last_updated).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—' },
  ];
  bar.innerHTML = items.map(i => `<div class="summary-item"><span class="s-label">${i.label}</span><span class="s-value">${i.value || '—'}</span></div>`).join('');
}

async function init() {
  try {
    const res = await fetch('./data/market.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    const genAt = data.meta?.generated_at;
    if (genAt) {
      const d = new Date(genAt);
      document.getElementById('last-updated').textContent = `UPDATED: ${d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})} ${d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})} UTC`;
    }
    if (data.macro) renderMacro(data.macro);
    if (data.summary) renderSummary(data.summary);
    const sectors = data.sectors || {};
    allStocks = [];
    const ORDER = ["Technology","Healthcare","Financials","Consumer Discretionary","Communication Services","Industrials","Consumer Staples","Energy","Utilities","Real Estate","Materials","Other"];
    for (const s of ORDER) if (sectors[s]) allStocks.push(...sectors[s]);
    for (const [sec, stocks] of Object.entries(sectors)) if (!ORDER.includes(sec)) allStocks.push(...stocks);
    buildSectorNav(allStocks);
    applyFiltersAndRender();
  } catch (err) {
    document.getElementById('loading').innerHTML = `<div class="loading-text" style="color:var(--c-bad)">ERROR LOADING DATA</div>`;
    console.error(err);
  }
}
init();
</script>
</body>
</html>
