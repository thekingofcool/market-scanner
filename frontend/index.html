<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET SCANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #222222;
  --text: #e0e0e0;
  --text-dim: #555;
  --text-mid: #888;
  --accent: #fff;
  --font: 'Press Start 2P', monospace;
  --c-good: #2ecc71;
  --c-bad: #c0392b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* ─── HEADER & MACRO ALIGNMENT ─── */
.top-layout {
  display: flex;
  gap: 40px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
  margin-bottom: 0;
}

.brand-side {
  flex: 0 0 160px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.brand-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 8px;
}

.last-updated {
  color: var(--text-dim);
  font-size: 6px;
  line-height: 1.4;
}

.macro-side {
  flex: 1;
}

.section-label {
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.macro-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.macro-card {
  background: var(--bg);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.macro-label {
  font-size: 6px;
  color: var(--text-dim);
}

.macro-value {
  font-size: 13px;
  color: var(--accent);
}

.macro-change { font-size: 7px; }
.macro-change.pos { color: var(--c-good); }
.macro-change.neg { color: var(--c-bad); }

/* ─── TABLE ─── */
#table-section {
  padding: 40px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 8px;
}

thead th {
  padding: 12px 10px;
  text-align: right;
  color: var(--text-dim);
  font-size: 6px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  cursor: pointer;
}

thead th:first-child, thead th:nth-child(2) { text-align: left; }

tbody tr { border-bottom: 1px solid #161616; }
tbody tr:hover { background: var(--surface); }

td { padding: 12px 10px; text-align: right; }
td:first-child, td:nth-child(2) { text-align: left; }

.td-ticker { color: var(--accent); font-size: 9px; }
.td-name { color: var(--text-mid); font-size: 7px; }

/* ─── HEATMAP CELLS ─── */
.hm {
  display: inline-block;
  padding: 4px 6px;
  font-size: 7px;
  min-width: 50px;
  border-radius: 2px;
}
.hm-0 { background: rgba(139,0,0,0.2); color: #ff6b6b; }
.hm-3 { background: rgba(100,100,100,0.1); color: var(--text-mid); }
.hm-6 { background: rgba(0,255,136,0.1); color: #00ff88; }

.sector-row td {
  padding: 30px 10px 10px;
  color: var(--text-dim);
  font-size: 7px;
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
}

#loading { padding: 100px; text-align: center; font-size: 8px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">
  <div class="top-layout">
    <div class="brand-side">
      <div class="brand-label">US EQUITIES</div>
      <div class="last-updated" id="last-updated">LOADING...</div>
    </div>
    <div class="macro-side">
      <div class="section-label">MACRO INDICATORS</div>
      <div class="macro-grid" id="macro-grid"></div>
    </div>
  </div>

  <div id="loading">SYNCHRONIZING DATA...</div>

  <section id="table-section" style="display:none">
    <table id="main-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </section>
</div>

<script>
let allStocks = [];
let sortCol = 'market_cap';
let sortDir = 'desc';

const COLS = [
  { key: 'ticker', label: 'TICKER', type: 'ticker' },
  { key: 'name', label: 'NAME', type: 'name' },
  { key: 'market_cap_b', label: 'MCAP $B', type: 'number' },
  { key: 'price', label: 'PRICE', type: 'number' },
  { key: 'change_pct', label: 'CHG%', type: 'change' },
  { key: 'pe', label: 'P/E', type: 'hm' },
  { key: 'ev_ebit', label: 'EV/EBIT', type: 'hm' },
  { key: 'fcf_yield', label: 'FCF YLD', type: 'hm' },
  { key: 'roic', label: 'ROIC%', type: 'hm' },
  { key: 'revenue_ttm', label: 'REV $M', type: 'number' }
];

function fmt(v) { return (v === null || v === undefined) ? '—' : v.toLocaleString(); }

function renderTable(stocks) {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');
  
  thead.innerHTML = `<tr>${COLS.map(c => `<th>${c.label}</th>`).join('')}</tr>`;
  
  let rows = '', lastSector = null;
  stocks.forEach(s => {
    if (s.sector !== lastSector) {
      rows += `<tr class="sector-row"><td colspan="${COLS.length}">${(s.sector || 'OTHER').toUpperCase()}</td></tr>`;
      lastSector = s.sector;
    }
    rows += `<tr>
      <td><span class="td-ticker">${s.ticker}</span></td>
      <td><span class="td-name">${s.name}</span></td>
      <td>${fmt(s.market_cap_b)}</td>
      <td>${fmt(s.price)}</td>
      <td class="${s.change_pct > 0 ? 'c-good' : 'c-bad'}">${s.change_pct}%</td>
      <td><span class="hm hm-3">${s.pe || '—'}</span></td>
      <td><span class="hm hm-3">${s.ev_ebit || '—'}</span></td>
      <td><span class="hm hm-3">${s.fcf_yield || '—'}</span></td>
      <td><span class="hm hm-3">${s.roic || '—'}</span></td>
      <td>${fmt(s.revenue_ttm)}</td>
    </tr>`;
  });
  tbody.innerHTML = rows;
}

async function init() {
  try {
    const res = await fetch('./data/market.json');
    const data = await res.json();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-section').style.display = 'block';

    // Last Updated
    if (data.meta?.generated_at) {
      const d = new Date(data.meta.generated_at);
      document.getElementById('last-updated').innerHTML = `AS OF<br>${d.toLocaleDateString()}`;
    }

    // Macro
    const grid = document.getElementById('macro-grid');
    Object.entries(data.macro || {}).slice(0, 6).forEach(([k, v]) => {
      grid.innerHTML += `<div class="macro-card">
        <div class="macro-label">${k.replace(/_/g,' ').toUpperCase()}</div>
        <div class="macro-value">${v.value}</div>
      </div>`;
    });

    // Stocks Data
    const sectors = data.sectors || {};
    Object.keys(sectors).forEach(sec => {
      allStocks.push(...sectors[sec].map(s => ({...s, sector: sec})));
    });
    
    renderTable(allStocks);
  } catch (e) {
    document.getElementById('loading').textContent = 'DATA UNAVAILABLE';
  }
}
init();
</script>
</body>
</html>
