name: Market Data Updater

on:
  # 定时运行：每天美东时间下午 5 点（UTC 22:00）
  schedule:
    - cron: '0 22 * * *'  # 每天 UTC 22:00 = 美东 17:00/18:00（夏令时/冬令时）
  
  # 手动触发
  workflow_dispatch:
    inputs:
      max_tickers:
        description: 'Maximum tickers to process'
        required: false
        default: '5000'
      request_delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '2.0'

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 小时超时（5000 股票足够了）
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests python-dotenv
      
      - name: Create data directory
        run: mkdir -p frontend/data
      
      - name: Run data fetcher
        env:
          # API Keys 从 GitHub Secrets 读取
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          
          # 配置参数（可以从手动触发覆盖）
          MAX_TICKERS: ${{ github.event.inputs.max_tickers || '5000' }}
          REQUEST_DELAY: ${{ github.event.inputs.request_delay || '2.0' }}
          MAX_RETRIES: '5'
        run: |
          cd backend
          python fetch_data.py
      
      - name: Check if data was generated
        run: |
          if [ ! -f frontend/data/market.json ]; then
            echo "❌ Error: market.json was not generated"
            exit 1
          fi
          
          # 显示文件大小
          FILE_SIZE=$(du -h frontend/data/market.json | cut -f1)
          echo "✅ Generated market.json (${FILE_SIZE})"
          
          # 验证 JSON 格式
          python -c "import json; json.load(open('frontend/data/market.json'))"
          echo "✅ JSON validation passed"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add frontend/data/market.json
          
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update market data - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
      
      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-data-${{ github.run_number }}
          path: frontend/data/market.json
          retention-days: 7
      
      - name: Summary
        if: always()
        run: |
          echo "## 📊 Market Data Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f frontend/data/market.json ]; then
            FILE_SIZE=$(du -h frontend/data/market.json | cut -f1)
            STOCK_COUNT=$(python -c "import json; data=json.load(open('frontend/data/market.json')); print(data['summary']['total_stocks'])")
            MCAP=$(python -c "import json; data=json.load(open('frontend/data/market.json')); print(data['summary']['total_market_cap_t'])")
            UPDATED=$(python -c "import json; data=json.load(open('frontend/data/market.json')); print(data['summary']['last_updated'])")
            
            echo "✅ **Success**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 📈 Total Stocks: **${STOCK_COUNT}**" >> $GITHUB_STEP_SUMMARY
            echo "- 💰 Total Market Cap: **\$${MCAP}T**" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 File Size: **${FILE_SIZE}**" >> $GITHUB_STEP_SUMMARY
            echo "- 🕐 Updated: **${UPDATED}**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Failed** - market.json not generated" >> $GITHUB_STEP_SUMMARY
          fi
